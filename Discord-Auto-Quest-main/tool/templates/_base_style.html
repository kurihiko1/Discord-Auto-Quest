<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;

    /* New Color System */
    --color-bg: #0b0f1a;
    --color-card: rgba(255, 255, 255, 0.05);
    --color-card-hover: rgba(255, 255, 255, 0.08);
    --color-text-primary: #f1f5f9;
    --color-text-secondary: #94a3b8;
    --color-text-dim: #64748b;

    /* Accent Gradients */
    --accent-indigo: #6366f1;
    --accent-cyan: #22d3ee;
    --accent-gradient: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
    
    --color-success: #10b981;
    --color-warning: #f59e0b;
    --color-error: #ef4444;
    --color-info: #3b82f6;

    --border-glass: rgba(255, 255, 255, 0.08);
    --border-glass-strong: rgba(255, 255, 255, 0.15);

    --shadow-soft: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
    
    --transition-base: 0.2s ease;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: var(--font-body);
    background-color: var(--color-bg);
    color: var(--color-text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
    min-height: 100vh;
  }

  /* SaaS Background with Radial Gradients */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background: 
      radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, var(--color-bg) 100%);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black, transparent 80%);
  }

  a {
    color: var(--accent-cyan);
    text-decoration: none;
    transition: var(--transition-base);
  }

  a:hover {
    color: var(--accent-indigo);
    text-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border-glass-strong);
    border-radius: 99px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent-indigo);
  }

  /* ── LAYOUT ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11, 15, 26, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-glass);
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 24px;
    height: 72px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent-gradient);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-glow);
  }

  .brand-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }

  .brand-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-text-primary);
    letter-spacing: -0.02em;
  }

  .brand-name .musashi-red {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Navigation Pills */
  .nav-pill {
    display: flex;
    gap: 4px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-glass);
    border-radius: 100px;
    padding: 4px;
  }

  .nav-pill a {
    padding: 8px 18px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-secondary);
    transition: var(--transition-base);
  }

  .nav-pill a:hover {
    color: var(--color-text-primary);
    background: rgba(255, 255, 255, 0.05);
  }

  .nav-pill a.active {
    color: #fff;
    background: var(--accent-gradient);
    box-shadow: var(--shadow-glow);
  }

  /* ── CARDS ── */
  .card {
    background: var(--color-card);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    overflow: hidden;
    transition: var(--transition-base);
    box-shadow: var(--shadow-soft);
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--border-glass-strong);
    background: var(--color-card-hover);
  }

  .card-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body {
    padding: 24px;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn-primary {
    background: var(--accent-gradient);
    color: #fff;
    box-shadow: var(--shadow-glow);
  }

  .btn-primary:hover {
    box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: var(--color-text-primary);
    border-color: var(--border-glass);
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--border-glass-strong);
  }

  .btn-ghost {
    background: transparent;
    color: var(--color-text-secondary);
    border-color: var(--border-glass);
  }

  .btn-ghost:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--color-text-primary);
    border-color: var(--border-glass-strong);
  }

  .btn-danger {
    background: rgba(239, 68, 68, 0.1);
    color: var(--color-error);
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .btn-danger:hover {
    background: var(--color-error);
    color: #fff;
  }

  .btn-sm {
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 8px;
  }

  .btn svg {
    width: 16px;
    height: 16px;
  }

  /* ── INPUTS ── */
  .input {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--color-text-primary);
    font-size: 14px;
    outline: none;
    transition: var(--transition-base);
  }

  .input:focus {
    border-color: var(--accent-indigo);
    background: rgba(0, 0, 0, 0.3);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  /* ── BADGES ── */
  .badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
  }

  .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--color-success); border-color: rgba(16, 185, 129, 0.2); }
  .badge-error { background: rgba(239, 68, 68, 0.1); color: var(--color-error); border-color: rgba(239, 68, 68, 0.2); }
  .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--color-warning); border-color: rgba(245, 158, 11, 0.2); }
  .badge-info { background: rgba(59, 130, 246, 0.1); color: var(--color-info); border-color: rgba(59, 130, 246, 0.2); }

  /* ── TOAST ── */
  .toast-host {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .toast {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-glass-strong);
    color: var(--color-text-primary);
    padding: 12px 20px;
    border-radius: 12px;
    box-shadow: var(--shadow-soft);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: toast-in 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes toast-in {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Mobile Nav Toggle */
  .nav-toggle {
    display: none;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass);
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .nav-toggle { display: flex; }
    .nav-pill {
      position: fixed;
      top: 80px;
      left: 20px;
      right: 20px;
      flex-direction: column;
      border-radius: 20px;
      padding: 10px;
      background: rgba(11, 15, 26, 0.95);
      backdrop-filter: blur(20px);
      display: none;
    }
    .nav-pill.open { display: flex; }
    .topbar-inner { padding: 0 20px; }
  }

  @keyframes pulse-dot {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }
</style>
